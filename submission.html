<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		body {
			font-family: Arial, sans-serif;
			margin: 30px;
			background: #ffffff;
		}

		#header-title {
			font-size: 24px;
			text-align: center;
			margin-bottom: 20px;
		}

		#visualization-activity {
			width: 800px;
			height: 520px;
			display: block;
			margin: 0 auto;
			background: white;
		}

		.axis {
			stroke: #444;
			stroke-width: 2;
		}

		.bar {
			stroke: none;
		}

		.label {
			font-size: 14px;
			fill: #222;
		}

		.tick-label {
			font-size: 12px;
			fill: #444;
		}

		.axis-title {
			font-size: 18px;
			font-weight: bold;
			fill: #222;
		}

		.value-label {
			font-size: 12px;
			fill: #222;
			text-anchor: middle;
		}

		.legend-text {
			font-size: 14px;
			fill: #222;
		}
	</style>
</head>

<body>
	<h1 id="header-title">
		Heyiheng
	</h1>

	<svg id="visualization-activity" viewBox="0 0 800 520">

		<!-- chart area settings -->
		<!-- left = 90, right = 740, top = 50, bottom = 430 -->
		<!-- max value = 80000 -->

		<!-- axes -->
		<line x1="90" y1="50" x2="90" y2="430" class="axis"></line>
		<line x1="90" y1="430" x2="740" y2="430" class="axis"></line>

		<!-- y-axis tick labels -->
		<text x="80" y="435" class="tick-label" text-anchor="end">0</text>
		<text x="80" y="340" class="tick-label" text-anchor="end">20,000</text>
		<text x="80" y="245" class="tick-label" text-anchor="end">40,000</text>
		<text x="80" y="150" class="tick-label" text-anchor="end">60,000</text>
		<text x="80" y="55" class="tick-label" text-anchor="end">80,000</text>

		<!-- y-axis title -->
		<text x="30" y="250" class="axis-title" transform="rotate(-90 30 250)">Entry Count</text>

		<!-- x-axis title -->
		<text x="415" y="490" class="axis-title" text-anchor="middle">Station Name</text>

		<!-- bars -->
		<!-- scale: 380 / 80000 -->
		<!-- heights:
		     Hongdae 72874 -> 346
		     Jamsil 63085 -> 300
		     Express Bus Terminal 53566 -> 254
		     Seoul Station 40617 -> 193
		     Sillim 38271 -> 182
		     Sindorim 37521 -> 178
		-->

		<!-- Hongdae Entrance -->
		<rect x="110" y="84" width="68" height="346" class="bar" fill="#08b34b"></rect>
		<text x="144" y="75" class="value-label">72,874</text>
		<text x="144" y="452" class="tick-label" text-anchor="middle">Hongdae</text>

		<!-- Jamsil -->
		<rect x="222" y="130" width="68" height="300" class="bar" fill="#08b34b"></rect>
		<text x="256" y="121" class="value-label">63,085</text>
		<text x="256" y="452" class="tick-label" text-anchor="middle">Jamsil</text>
		<text x="256" y="468" class="tick-label" text-anchor="middle">(Line 2)</text>

		<!-- Express Bus Terminal -->
		<rect x="334" y="176" width="68" height="254" class="bar" fill="#f28a1a"></rect>
		<text x="368" y="167" class="value-label">53,566</text>
		<text x="368" y="452" class="tick-label" text-anchor="middle">Express Bus</text>
		<text x="368" y="468" class="tick-label" text-anchor="middle">Terminal</text>

		<!-- Seoul Station -->
		<rect x="446" y="237" width="68" height="193" class="bar" fill="#1565c0"></rect>
		<text x="480" y="228" class="value-label">40,617</text>
		<text x="480" y="452" class="tick-label" text-anchor="middle">Seoul</text>
		<text x="480" y="468" class="tick-label" text-anchor="middle">Station</text>

		<!-- Sillim -->
		<rect x="558" y="248" width="68" height="182" class="bar" fill="#08b34b"></rect>
		<text x="592" y="239" class="value-label">38,271</text>
		<text x="592" y="452" class="tick-label" text-anchor="middle">Sillim</text>

		<!-- Sindorim -->
		<rect x="670" y="252" width="68" height="178" class="bar" fill="#08b34b"></rect>
		<text x="704" y="243" class="value-label">37,521</text>
		<text x="704" y="452" class="tick-label" text-anchor="middle">Sindorim</text>

		<!-- legend -->
		<rect x="640" y="20" width="14" height="14" fill="#1565c0"></rect>
		<text x="662" y="32" class="legend-text">Line 1</text>

		<rect x="710" y="20" width="14" height="14" fill="#08b34b"></rect>
		<text x="732" y="32" class="legend-text">Line 2</text>

		<rect x="640" y="42" width="14" height="14" fill="#f28a1a"></rect>
		<text x="662" y="54" class="legend-text">Line 3</text>

	</svg>

</body>
</html>
